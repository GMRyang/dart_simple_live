name: app-build-action-dev

on:
  workflow_dispatch:
  push:
    tags:
      - "dev_v*"

jobs:
  # 打包Android、iOS、Mac (Debug版本)
  build-mac-ios-android:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4
        with:
          ref: dev

      # 设置JAVA环境
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      # 设置Flutter
      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 打开MAC Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-macos-desktop

      # 更新Flutter的packages
      - name: Restore packages
        run: |
          cd simple_live_app
          flutter pub get

      # 打包 Debug APK (不需要签名)
      - name: Build Debug APK
        run: |
          cd simple_live_app
          flutter build apk --debug

      # 上传 Debug APK 至 Artifacts
      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-debug
          path: simple_live_app/build/app/outputs/flutter-apk/app-debug.apk

      # 打包iOS Debug
      - name: Build iOS Debug
        run: |
          cd simple_live_app
          flutter build ios --debug --no-codesign

      # 创建未签名 Debug ipa
      - name: Create IPA
        run: |
          cd simple_live_app
          mkdir build/ios/iphoneos/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/Runner.app
          cd build/ios/iphoneos/
          zip -q -r ios_debug_no_sign.ipa Payload
          cd ../../..

      # 上传 Debug IPA 至 Artifacts
      - name: Upload IPA to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug
          path: simple_live_app/build/ios/iphoneos/ios_debug_no_sign.ipa

      # 打包 MAC Debug
      - name: Build MacOS Debug
        run: |
          cd simple_live_app
          flutter build macos --debug

      # 上传 MAC Debug 产物 (打包为 .app 文件夹)
      - name: Upload MacOS to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-debug
          path: simple_live_app/build/macos/Build/Products/Debug/

      # 完成
      - run: echo "🍏 This job's status is ${{ job.status }}."

  # 打包Linux (Debug版本)
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4
        with:
          ref: dev

      # 设置Flutter环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 安装依赖
      - name: Update apt-get
        run: sudo apt-get update
      - name: Install Dependencies
        run: sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libasound2-dev libmpv-dev mpv

      # 打开Linux Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-linux-desktop

      # 更新Flutter的packages
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      # 编译 Linux Debug
      - name: Build Linux Debug
        run: |
          cd simple_live_app
          flutter build linux --debug

      # 上传 Linux Debug 产物
      - name: Upload Linux APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-debug
          path: simple_live_app/build/linux/x64/debug/bundle/

      # 完成
      - run: echo "🍏 Linux job's status is ${{ job.status }}."

  # 打包Windows (Debug版本)
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      # 签出代码
      - uses: actions/checkout@v4
        with:
          ref: dev

      # 设置Flutter环境
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # 打开Windows Desktop支持
      - name: Enable Flutter Desktop
        run: flutter config --enable-windows-desktop

      # 更新Flutter的packages
      - name: Restore Packages
        run: |
          cd simple_live_app
          flutter pub get

      # 编译 Windows Debug
      - name: Build Windows Debug
        run: |
          cd simple_live_app
          flutter build windows --debug

      # 上传 Windows Debug 产物
      - name: Upload Windows APP to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-debug
          path: simple_live_app/build/windows/x64/runner/Debug/

      # 完成
      - run: echo "🍏 Windows job's status is ${{ job.status }}."
